# ═══════════════════════════════════════════════════
# USBGuard Approval Manager - Configuration
# Version: 2.2
# ═══════════════════════════════════════════════════════

# ── Paths ──────────────────────────────────────────
RULES_SYSTEM=/etc/usbguard/rules.d/00-system.rules
RULES_PERMANENT=/etc/usbguard/rules.d/50-permanent.rules
RULES_TEMPORARY=/etc/usbguard/rules.d/90-temporary.rules
BACKUP_DIR=/etc/usbguard/backups
LOG_FILE=/var/log/usbguard-approval.log
STATE_DIR=/var/lib/usbguard-manager
# LOCK_FILE=/var/lock/usbguard-manager.lock
LOCK_FILE=/var/lib/usbguard-manager/usbguard-manager.lock

# ── Retention ──────────────────────────────────────
BACKUP_KEEP=5

# ── TTL Policy (Epoch Seconds) ─────────────────────
TEMP_TTL_SECONDS=3600

# ── Cleanup ────────────────────────────────────────
CLEANUP_INTERVAL_MINUTES=5
RELOAD_TIMEOUT=5

# ── Auto-Approve (Optional) ────────────────────────
AUTO_APPROVE_ENABLED=false

# ── Authorization ──────────────────────────────────
ALLOWED_USERS=root,admin,usbadmin
ALLOWED_GROUPS=wheel,usbadmins

# ── Behavior ───────────────────────────────────────
CHECK_DUPLICATES=true
NOTIFY_DESKTOP=false
LOG_LEVEL=INFO

# ── Time Guards ────────────────────────────────────
MIN_REASONABLE_EPOCH=1577836800
MAX_CLOCK_JUMP_SECONDS=3600